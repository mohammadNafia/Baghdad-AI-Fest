name: baghdad-ai-summit
region: nyc

# Backend API Service
services:
- name: api
  github:
    repo: Muammal/Baghdad-ai-summit
    branch: main
    deploy_on_push: true
  dockerfile_path: Dockerfile
  source_dir: /
  http_port: 8080
  instance_count: 1
  instance_size_slug: basic-xxs
  routes:
  - path: /api
  health_check:
    http_path: /api/health
  envs:
  - key: ASPNETCORE_ENVIRONMENT
    value: Production

# Frontend Service
- name: frontend
  github:
    repo: Muammal/Baghdad-ai-summit
    branch: main
    deploy_on_push: true
  dockerfile_path: front-end/Dockerfile
  source_dir: front-end
  http_port: 80
  instance_count: 1
  instance_size_slug: basic-xxs
  routes:
  - path: /
  envs:
  - key: VITE_API_URL
    value: https://aidevfest-site-777jj.ondigitalocean.app/api
  # PORT is automatically set by DigitalOcean - don't override ASPNETCORE_URLS
  # The Dockerfile will use PORT env var: http://+:${PORT:-8080}
